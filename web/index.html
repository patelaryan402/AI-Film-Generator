<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Film Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

  <div class="badge">AI FILM STUDIO</div>

  <div class="title">AI Short Film Generator</div>
  <div class="subtitle">Powered by Gen AI + Java</div>

  <div class="card">

    <div class="field-label">Your film idea</div>

    <textarea id="idea" class="film-input"
      placeholder="e.g. A lonely astronaut receives a message from Earth after 10 years of silence..."></textarea>

    <div class="divider"></div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate('chat')">Develop Story</button>
      <button class="btn btn-ghost" onclick="generate('script')">Write Script</button>
      <button class="btn btn-ghost" onclick="generate('scenes')">Break Scenes</button>
      <button class="btn btn-ghost" onclick="generate('narration')">Narration</button>
    </div>

    <!-- Loading -->
    <div id="loading" style="display:none;">
      <span class="loading-dots">
        <span></span><span></span><span></span>
      </span>
      Generating with AI...
    </div>

    <!-- Result -->
    <div id="result-box" class="output-area">

      <div class="output-label">
        <span id="result-label">Result</span>
        <button class="copy-btn" onclick="copyResult()">Copy</button>
      </div>

      <div id="result-text" class="output-box"></div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
